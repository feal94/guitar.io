<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>guitar.io - Exercise</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/exercise.css">
</head>
<body>
    <div x-data="exerciseApp" class="dashboard-container">
        <div data-nav-include="back-exercises"></div>
        <!-- Main Content -->
        <div class="container mt-4" x-show="exercise">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <!-- Exercise Header -->
                    <div class="card mb-4">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <h2 class="mb-0" x-text="exercise.title"></h2>
                                <span class="badge fs-6" 
                                      :class="{
                                          'bg-success': exercise.difficulty === 'beginner',
                                          'bg-warning': exercise.difficulty === 'intermediate',
                                          'bg-danger': exercise.difficulty === 'advanced'
                                      }"
                                      x-text="exercise.difficulty"></span>
                            </div>
                            <p class="text-muted mb-3" x-text="exercise.description"></p>
                            
                            <!-- Progress Stats -->
                            <div class="row text-center">
                                <div class="col-6">
                                    <div class="stat-item">
                                        <h4 class="mb-0" x-text="progress.times_practiced"></h4>
                                        <small class="text-muted">Times Practiced</small>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="stat-item">
                                        <h4 class="mb-0" x-text="progress.last_practiced ? formatDate(progress.last_practiced) : 'Never'"></h4>
                                        <small class="text-muted">Last Practiced</small>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Exercise Image/Diagram -->
                    <div class="card mb-4" x-show="exercise.image_path">
                        <div class="card-body text-center">
                            <img :src="exercise.image_path" 
                                 :alt="exercise.title" 
                                 class="img-fluid exercise-diagram">
                            <p class="text-muted small mt-2">Exercise diagram</p>
                        </div>
                    </div>

                    <!-- Exercise PDF Viewer -->
                    <div class="card mb-4" x-show="!exercise.image_path && exercise.pdf_path">
                        <div class="card-body">
                            <h5 class="card-title mb-3">Exercise PDF</h5>
                            <div class="mb-3 w-100" x-data="pdfViewer(exercise, 'pdf_path')">
                                <div class="pdf-inline-wrap border rounded bg-light overflow-hidden" x-ref="pdfOuter">
                                    <div class="pdf-toolbar d-flex flex-wrap align-items-center justify-content-between gap-2 px-2 py-2 border-bottom bg-white" x-show="!error">
                                        <span class="small text-muted mb-0">Zoom</span>
                                        <div class="btn-group btn-group-sm pdf-zoom-btns" role="group" aria-label="PDF zoom">
                                            <button type="button" class="btn btn-outline-secondary" @click.prevent="pdfZoomOut()" :disabled="loading || pdfZoom <= 0.5" title="Zoom out">−</button>
                                            <span class="btn btn-outline-secondary text-nowrap disabled" x-text="Math.round(pdfZoom * 100) + '%'"></span>
                                            <button type="button" class="btn btn-outline-secondary" @click.prevent="pdfZoomIn()" :disabled="loading || pdfZoom >= 4" title="Zoom in">+</button>
                                            <button type="button" class="btn btn-outline-primary" @click.prevent="pdfZoomFit()" :disabled="loading" title="Fit width">Fit</button>
                                        </div>
                                    </div>
                                    <div x-show="loading" class="text-center py-5">
                                        <div class="spinner-border text-primary" role="status" aria-hidden="true"></div>
                                        <p class="text-muted small mb-0 mt-2">Loading PDF…</p>
                                    </div>
                                    <div x-show="error" class="alert alert-warning m-3 mb-0" x-text="error"></div>
                                    <div x-ref="pdfHost" class="pdf-inline-scroll" x-show="!loading && !error"></div>
                                </div>
                            </div>
                            <a :href="exercise.pdf_path" target="_blank" rel="noopener" class="btn btn-outline-primary btn-sm">
                                Open PDF in new tab
                            </a>
                        </div>
                    </div>

                    <!-- Practice Controls -->
                    <div class="card mb-4" x-show="!isTimerRunning">
                        <div class="card-header bg-white">
                            <h5 class="mb-0">Practice Settings</h5>
                        </div>
                        <div class="card-body">
                            <div class="row g-4">
                                <!-- Time Control -->
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Time (minutes)</label>
                                    <div class="input-group input-group-lg">
                                        <button class="btn btn-outline-secondary" type="button" @click="decreaseTime">
                                            <i class="bi bi-dash"></i>
                                        </button>
                                        <input type="number" 
                                               class="form-control text-center" 
                                               x-model.number="practiceTime" 
                                               @change="validatePracticeTime"
                                               min="5" 
                                               max="60" 
                                               step="5">
                                        <button class="btn btn-outline-secondary" type="button" @click="increaseTime">
                                            <i class="bi bi-plus"></i>
                                        </button>
                                    </div>
                                </div>

                                <!-- BPM Control -->
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">BPM (tempo)</label>
                                    <div class="input-group input-group-lg">
                                        <button class="btn btn-outline-secondary" type="button" @click="decreaseBpm">
                                            <i class="bi bi-dash"></i>
                                        </button>
                                        <input type="number" 
                                               class="form-control text-center" 
                                               x-model.number="bpm" 
                                               @change="validateBpm"
                                               min="40" 
                                               max="200" 
                                               step="1">
                                        <button class="btn btn-outline-secondary" type="button" @click="increaseBpm">
                                            <i class="bi bi-plus"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Timer Display -->
                    <div class="card mb-4" x-show="isTimerRunning">
                        <div class="card-body text-center py-5">
                            <h2 class="text-muted mb-2">Time Remaining</h2>
                            <div class="timer-display mb-4" x-text="timerDisplay"></div>
                            
                            <!-- Timer Controls -->
                            <div class="d-flex gap-2 justify-content-center mb-4">
                                <button class="btn btn-warning btn-lg" @click="isTimerPaused ? resumeTimer() : pauseTimer()" x-show="!isTimerPaused">
                                    <i class="bi bi-pause-fill me-2"></i>Pause
                                </button>
                                <button class="btn btn-success btn-lg" @click="resumeTimer()" x-show="isTimerPaused">
                                    <i class="bi bi-play-fill me-2"></i>Resume
                                </button>
                                <button class="btn btn-danger btn-lg" @click="stopTimer">
                                    <i class="bi bi-stop-fill me-2"></i>Stop
                                </button>
                            </div>
                            
                            <!-- Metronome Controls -->
                            <div class="row g-3">
                                <div class="col-12">
                                    <button class="btn btn-lg w-100" 
                                            :class="isMetronomeOn ? 'btn-success' : 'btn-outline-secondary'"
                                            @click="toggleMetronome">
                                        <i class="bi me-2" :class="isMetronomeOn ? 'bi-volume-up-fill' : 'bi-volume-mute-fill'"></i>
                                        <span x-text="isMetronomeOn ? 'Metronome On' : 'Metronome Off'"></span>
                                    </button>
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-bold">BPM (tempo)</label>
                                    <div class="input-group input-group-lg">
                                        <button class="btn btn-outline-secondary" type="button" @click="decreaseBpm">
                                            <i class="bi bi-dash"></i>
                                        </button>
                                        <input type="number" 
                                               class="form-control text-center" 
                                               x-model.number="bpm" 
                                               @change="validateBpm"
                                               min="40" 
                                               max="200" 
                                               step="1">
                                        <button class="btn btn-outline-secondary" type="button" @click="increaseBpm">
                                            <i class="bi bi-plus"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Start Button -->
                    <div class="d-grid gap-2 mb-4" x-show="!isTimerRunning">
                        <button class="btn btn-primary btn-lg" @click="startPractice">
                            <i class="bi bi-play-fill me-2"></i>Start Practice!
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Loading State -->
        <div class="container mt-4" x-show="!exercise">
            <div class="app-loading-block text-center" role="status" aria-live="polite" aria-busy="true">
                <div class="spinner-border text-primary" aria-hidden="true"></div>
                <p class="text-muted small mb-0">Loading this exercise…</p>
            </div>
        </div>
    </div>
    
    
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script defer src="js/app.js"></script>

    <script defer src="js/practice-data.js"></script>

    <script defer src="js/exercise.js"></script>
    <script type="module" src="js/pdf-viewer.js"></script>

    <script type="module" src="js/supabase-init.js"></script>
    <script type="module" src="js/includes.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>

</body>
</html>
