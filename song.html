<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>guitar.io - Song</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/exercise.css">
</head>
<body>
    <div x-data="songApp" class="dashboard-container">
        <!-- Top Bar -->
        <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
            <div class="container-fluid">
                <a class="navbar-brand fw-bold text-primary" href="dashboard.html">guitar.io</a>
                
                <div class="d-flex align-items-center">
                    <a href="songs.html" class="btn btn-outline-secondary me-2">
                        <i class="bi bi-arrow-left me-1"></i>Back to Songs
                    </a>
                    
                    <!-- User Dropdown -->
                    <div class="dropdown">
                        <button class="btn btn-outline-primary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle me-1"></i>
                            <span x-text="userEmail">User</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="#" @click.prevent="alert('Profile - Coming soon')"><i class="bi bi-person me-2"></i>Profile</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" @click.prevent="logout"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="container mt-4" x-show="song">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <!-- Song Header -->
                    <div class="card mb-4">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <div>
                                    <h2 class="mb-0" x-text="song.title"></h2>
                                    <p class="text-muted" x-text="song.artist"></p>
                                </div>
                                <span class="badge bg-info fs-6" x-text="song.bpm + ' BPM'"></span>
                            </div>
                        </div>
                    </div>

                    <!-- Song Tab Viewer -->
                    <div class="card mb-4" x-show="song.tab_url">
                        <div class="card-body">
                            <h5 class="card-title mb-3">Song Tab</h5>
                            <div class="ratio ratio-4x3 mb-3">
                                <iframe :src="song.tab_url"
                                        title="Song Tab"
                                        style="border: 1px solid #dee2e6; border-radius: 0.25rem;"></iframe>
                            </div>
                            <a :href="song.tab_url" target="_blank" rel="noopener" class="btn btn-outline-primary btn-sm">
                                Open Tab in new tab
                            </a>
                        </div>
                    </div>

                    <!-- External Tab Link -->
                    <div class="card mb-4" x-show="song.song_url && !song.tab_url">
                        <div class="card-body">
                            <h5 class="card-title mb-3">External Tab</h5>
                            <p>This song has an external tab link.</p>
                            <a :href="song.song_url" target="_blank" class="btn btn-primary">
                                <i class="bi bi-link-45deg me-1"></i>View Tab
                            </a>
                        </div>
                    </div>


                    <!-- Practice Controls -->
                    <div class="card mb-4" x-show="!isTimerRunning">
                        <div class="card-header bg-white">
                            <h5 class="mb-0">Practice Settings</h5>
                        </div>
                        <div class="card-body">
                            <div class="row g-4">
                                <!-- Time Control -->
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Time (minutes)</label>
                                    <div class="input-group input-group-lg">
                                        <button class="btn btn-outline-secondary" type="button" @click="decreaseTime">
                                            <i class="bi bi-dash"></i>
                                        </button>
                                        <input type="number" 
                                               class="form-control text-center" 
                                               x-model.number="practiceTime" 
                                               @change="validatePracticeTime"
                                               min="5" 
                                               max="60" 
                                               step="5">
                                        <button class="btn btn-outline-secondary" type="button" @click="increaseTime">
                                            <i class="bi bi-plus"></i>
                                        </button>
                                    </div>
                                </div>

                                <!-- BPM Control -->
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">BPM (tempo)</label>
                                    <div class="input-group input-group-lg">
                                        <button class="btn btn-outline-secondary" type="button" @click="decreaseBpm">
                                            <i class="bi bi-dash"></i>
                                        </button>
                                        <input type="number" 
                                               class="form-control text-center" 
                                               x-model.number="bpm" 
                                               @change="validateBpm"
                                               min="40" 
                                               max="200" 
                                               step="1">
                                        <button class="btn btn-outline-secondary" type="button" @click="increaseBpm">
                                            <i class="bi bi-plus"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Timer Display -->
                    <div class="card mb-4" x-show="isTimerRunning">
                        <div class="card-body text-center py-5">
                            <h2 class="text-muted mb-2">Time Remaining</h2>
                            <div class="timer-display" x-text="timerDisplay"></div>
                            
                            <!-- Timer Controls -->
                            <div class="d-flex gap-2 justify-content-center mb-4">
                                <button class="btn btn-warning btn-lg" @click="isTimerPaused ? resumeTimer() : pauseTimer()" x-show="!isTimerPaused">
                                    <i class="bi bi-pause-fill me-2"></i>Pause
                                </button>
                                <button class="btn btn-success btn-lg" @click="resumeTimer()" x-show="isTimerPaused">
                                    <i class="bi bi-play-fill me-2"></i>Resume
                                </button>
                                <button class="btn btn-danger btn-lg" @click="stopTimer">
                                    <i class="bi bi-stop-fill me-2"></i>Stop
                                </button>
                            </div>
                            
                            <!-- Metronome Controls -->
                            <div class="row g-3">
                                <div class="col-12">
                                    <button class="btn btn-lg w-100" 
                                            :class="isMetronomeOn ? 'btn-success' : 'btn-outline-secondary'"
                                            @click="toggleMetronome">
                                        <i class="bi me-2" :class="isMetronomeOn ? 'bi-volume-up-fill' : 'bi-volume-mute-fill'"></i>
                                        <span x-text="isMetronomeOn ? 'Metronome On' : 'Metronome Off'"></span>
                                    </button>
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-bold">BPM (tempo)</label>
                                    <div class="input-group input-group-lg">
                                        <button class="btn btn-outline-secondary" type="button" @click="decreaseBpm">
                                            <i class="bi bi-dash"></i>
                                        </button>
                                        <input type="number" 
                                               class="form-control text-center" 
                                               x-model.number="bpm" 
                                               @change="validateBpm"
                                               min="40" 
                                               max="200" 
                                               step="1">
                                        <button class="btn btn-outline-secondary" type="button" @click="increaseBpm">
                                            <i class="bi bi-plus"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Start Button -->
                    <div class="d-grid gap-2 mb-4" x-show="!isTimerRunning">
                        <button class="btn btn-primary btn-lg" @click="startPractice">
                            <i class="bi bi-play-fill me-2"></i>Start Practice!
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Loading State -->
        <div class="container mt-5" x-show="!song">
            <div class="text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS Bundle -->
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script defer src="js/app.js"></script>
    <script defer src="js/practice-data.js"></script>
    <script type="module" src="js/supabase-init.js"></script>
    <script defer src="js/song.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
</body>
</html>
