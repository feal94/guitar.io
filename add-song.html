<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>guitar.io - Add Song</title>
    
    <!-- Bootstrap CSS -->
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div x-data="addSongApp" class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="text-center mb-4">
                    <a href="dashboard.html" class="navbar-brand fw-bold text-primary fs-2">guitar.io</a>
                </div>

                <div class="card" x-show="!initialLoading && !editLoadError">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h3 class="card-title mb-0" x-text="editingId ? 'Edit Song' : 'Add a New Song'"></h3>
                            <a :href="editingId ? ('song.html?id=' + editingId) : 'songs.html'" class="btn btn-outline-secondary">
                                <i class="bi bi-x-lg"></i>
                            </a>
                        </div>
                        
                        <form @submit.prevent="saveSong">
                            <!-- Song Title -->
                            <div class="mb-3">
                                <label for="songTitle" class="form-label">Song Title</label>
                                <input type="text" class="form-control" id="songTitle" x-model="song.title" required>
                            </div>

                            <!-- Artist -->
                            <div class="mb-3">
                                <label for="songArtist" class="form-label">Artist</label>
                                <input type="text" class="form-control" id="songArtist" x-model="song.artist">
                            </div>

                            <!-- BPM -->
                            <div class="mb-3">
                                <label for="songBpm" class="form-label">BPM (Beats Per Minute)</label>
                                <input type="number" class="form-control" id="songBpm" x-model.number="song.bpm">
                            </div>

                            <!-- Song URL -->
                            <div class="mb-3">
                                <label for="songUrl" class="form-label">Tab URL</label>
                                <input type="url" class="form-control" id="songUrl" name="tab_url_field" autocomplete="off" autocorrect="off" spellcheck="false" x-model="song.song_url" placeholder="https://www.ultimateguitar.com/...">
                            </div>

                            <!-- Tab File -->
                            <div class="mb-4">
                                <label for="songTab" class="form-label">Upload Tab File (PDF or Image)</label>
                                <input class="form-control" type="file" id="songTab" @change="handleFileUpload">
                                <p class="form-text small text-muted mb-0" x-show="editingId && song.tab_path">
                                    A tab file is already uploaded; choosing a new file replaces it.
                                </p>
                            </div>

                            <!-- Loading Indicator -->
                            <div x-show="isLoading" class="text-center my-3">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                                <p class="mt-2" x-text="editingId ? 'Uploading file and saving changes…' : 'Uploading file and saving song...'"></p>
                            </div>
                            
                            <!-- Error Message -->
                            <div x-show="errorMessage" class="alert alert-danger" x-text="errorMessage"></div>


                            <!-- Submit Button -->
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg" :disabled="isLoading">
                                    <span x-show="!isLoading && !editingId">Add Song</span>
                                    <span x-show="!isLoading && editingId">Save changes</span>
                                    <span x-show="isLoading && !editingId">Adding...</span>
                                    <span x-show="isLoading && editingId">Saving...</span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="text-center my-5" x-show="initialLoading" role="status" aria-live="polite" aria-busy="true">
                    <div class="spinner-border text-primary" aria-hidden="true"></div>
                    <p class="text-muted small mb-0 mt-2">Loading song…</p>
                </div>

                <div class="alert alert-danger" x-show="editLoadError" x-text="editLoadError"></div>
                <div class="text-center" x-show="editLoadError">
                    <a href="songs.html" class="btn btn-outline-primary">Back to songs</a>
                </div>
            </div>
        </div>
    </div>
    
    
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script defer src="js/app.js"></script>

    <script defer src="js/add-song.js"></script>

    <script type="module" src="js/supabase-init.js"></script>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>

</body>
</html>
