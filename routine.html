<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>guitar.io - Practice Routine</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/exercise.css">
</head>
<body>
    <div x-data="routineApp" class="dashboard-container">
        <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
            <div class="container-fluid">
                <a class="navbar-brand fw-bold text-primary" href="dashboard.html">guitar.io</a>

                <div class="d-flex align-items-center">
                    <a href="routines.html" class="btn btn-outline-secondary me-2">
                        <i class="bi bi-arrow-left me-1"></i>My routines
                    </a>

                    <div class="dropdown">
                        <button class="btn btn-outline-primary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle me-1"></i>
                            <span x-text="userEmail">User</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="#" @click.prevent="alert('Profile - Coming soon')"><i class="bi bi-person me-2"></i>Profile</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" @click.prevent="logout"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>

        <div class="container mt-4" x-show="routineMeta && steps.length">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="card mb-3">
                        <div class="card-body">
                            <div class="d-flex flex-wrap justify-content-between align-items-start gap-2">
                                <div>
                                    <h2 class="mb-1" x-text="routineMeta.name"></h2>
                                    <p class="text-muted mb-0 small" x-show="routineMeta.description" x-text="routineMeta.description"></p>
                                </div>
                                <span class="badge bg-dark align-self-center">
                                    Step <span x-text="currentIndex + 1"></span> / <span x-text="steps.length"></span>
                                </span>
                            </div>

                            <div class="d-flex flex-wrap gap-2 mt-3">
                                <button type="button" class="btn btn-outline-secondary btn-sm" @click="goPrev" :disabled="isTimerRunning || currentIndex === 0">
                                    <i class="bi bi-chevron-left"></i> Previous
                                </button>
                                <button type="button" class="btn btn-outline-secondary btn-sm" @click="goNext" :disabled="isTimerRunning || currentIndex >= steps.length - 1">
                                    Next <i class="bi bi-chevron-right"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Song step -->
                    <template x-if="currentKind === 'song' && song">
                        <div>
                            <div class="card mb-4">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between align-items-start mb-2">
                                        <div>
                                            <h3 class="mb-0" x-text="song.title"></h3>
                                            <p class="text-muted mb-0" x-text="song.artist"></p>
                                        </div>
                                        <span class="badge bg-info fs-6" x-text="(song.bpm || bpm || 60) + ' BPM'"></span>
                                    </div>
                                </div>
                            </div>

                            <div class="card mb-4" x-show="song.tab_url">
                                <div class="card-body">
                                    <h5 class="card-title mb-3">Song tab</h5>
                                    <div class="ratio ratio-4x3 mb-3">
                                        <iframe :src="song.tab_url" title="Song tab" style="border: 1px solid #dee2e6; border-radius: 0.25rem;"></iframe>
                                    </div>
                                    <a :href="song.tab_url" target="_blank" rel="noopener" class="btn btn-outline-primary btn-sm">Open tab in new tab</a>
                                </div>
                            </div>

                            <div class="card mb-4" x-show="song.song_url && !song.tab_url">
                                <div class="card-body">
                                    <h5 class="card-title mb-3">External tab</h5>
                                    <a :href="song.song_url" target="_blank" class="btn btn-primary">
                                        <i class="bi bi-link-45deg me-1"></i>View tab
                                    </a>
                                </div>
                            </div>
                        </div>
                    </template>

                    <!-- Exercise step -->
                    <template x-if="currentKind === 'exercise' && exercise">
                        <div>
                            <div class="card mb-4">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between align-items-start mb-2">
                                        <h3 class="mb-0" x-text="exercise.title"></h3>
                                        <span class="badge fs-6"
                                              :class="{
                                                  'bg-success': exercise.difficulty === 'beginner',
                                                  'bg-warning': exercise.difficulty === 'intermediate',
                                                  'bg-danger': exercise.difficulty === 'advanced'
                                              }"
                                              x-text="exercise.difficulty"></span>
                                    </div>
                                    <p class="text-muted mb-3" x-text="exercise.description"></p>
                                    <div class="row text-center" x-show="exerciseProgress">
                                        <div class="col-6">
                                            <div class="stat-item">
                                                <h4 class="mb-0" x-text="exerciseProgress.times_practiced"></h4>
                                                <small class="text-muted">Times practiced</small>
                                            </div>
                                        </div>
                                        <div class="col-6">
                                            <div class="stat-item">
                                                <h4 class="mb-0" x-text="exerciseProgress.last_practiced ? formatDate(exerciseProgress.last_practiced) : 'Never'"></h4>
                                                <small class="text-muted">Last practiced</small>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="card mb-4" x-show="exercise.image_path">
                                <div class="card-body text-center">
                                    <img :src="exercise.image_path" :alt="exercise.title" class="img-fluid exercise-diagram">
                                </div>
                            </div>

                            <div class="card mb-4" x-show="!exercise.image_path && exercise.pdf_path">
                                <div class="card-body">
                                    <h5 class="card-title mb-3">Exercise PDF</h5>
                                    <div class="ratio ratio-4x3 mb-3">
                                        <iframe :src="exercise.pdf_path" title="Exercise PDF" style="border: 1px solid #dee2e6; border-radius: 0.25rem;"></iframe>
                                    </div>
                                    <a :href="exercise.pdf_path" target="_blank" rel="noopener" class="btn btn-outline-primary btn-sm">Open PDF in new tab</a>
                                </div>
                            </div>
                        </div>
                    </template>

                    <!-- Practice controls (shared) -->
                    <div class="card mb-4" x-show="!isTimerRunning && currentKind">
                        <div class="card-header bg-white">
                            <h5 class="mb-0">Practice settings</h5>
                        </div>
                        <div class="card-body">
                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Time (minutes)</label>
                                    <div class="input-group input-group-lg">
                                        <button class="btn btn-outline-secondary" type="button" @click="decreaseTime">
                                            <i class="bi bi-dash"></i>
                                        </button>
                                        <input type="number" class="form-control text-center" x-model.number="practiceTime" @change="validatePracticeTime" min="1" max="180" step="1">
                                        <button class="btn btn-outline-secondary" type="button" @click="increaseTime">
                                            <i class="bi bi-plus"></i>
                                        </button>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">BPM (tempo)</label>
                                    <div class="input-group input-group-lg">
                                        <button class="btn btn-outline-secondary" type="button" @click="decreaseBpm">
                                            <i class="bi bi-dash"></i>
                                        </button>
                                        <input type="number" class="form-control text-center" x-model.number="bpm" @change="validateBpm" min="40" max="200" step="1">
                                        <button class="btn btn-outline-secondary" type="button" @click="increaseBpm">
                                            <i class="bi bi-plus"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card mb-4" x-show="isTimerRunning">
                        <div class="card-body text-center py-5">
                            <h2 class="text-muted mb-2">Time remaining</h2>
                            <div class="timer-display mb-4" x-text="timerDisplay"></div>

                            <div class="d-flex gap-2 justify-content-center mb-4">
                                <button class="btn btn-warning btn-lg" @click="isTimerPaused ? resumeTimer() : pauseTimer()" x-show="!isTimerPaused">
                                    <i class="bi bi-pause-fill me-2"></i>Pause
                                </button>
                                <button class="btn btn-success btn-lg" @click="resumeTimer()" x-show="isTimerPaused">
                                    <i class="bi bi-play-fill me-2"></i>Resume
                                </button>
                                <button class="btn btn-danger btn-lg" @click="stopTimer">
                                    <i class="bi bi-stop-fill me-2"></i>Stop
                                </button>
                            </div>

                            <div class="row g-3">
                                <div class="col-12">
                                    <button type="button" class="btn btn-lg w-100"
                                            :class="isMetronomeOn ? 'btn-success' : 'btn-outline-secondary'"
                                            @click="toggleMetronome">
                                        <i class="bi me-2" :class="isMetronomeOn ? 'bi-volume-up-fill' : 'bi-volume-mute-fill'"></i>
                                        <span x-text="isMetronomeOn ? 'Metronome on' : 'Metronome off'"></span>
                                    </button>
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-bold">BPM (tempo)</label>
                                    <div class="input-group input-group-lg">
                                        <button class="btn btn-outline-secondary" type="button" @click="decreaseBpm">
                                            <i class="bi bi-dash"></i>
                                        </button>
                                        <input type="number" class="form-control text-center" x-model.number="bpm" @change="validateBpm" min="40" max="200" step="1">
                                        <button class="btn btn-outline-secondary" type="button" @click="increaseBpm">
                                            <i class="bi bi-plus"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="d-grid gap-2 mb-4" x-show="!isTimerRunning && currentKind">
                        <button type="button" class="btn btn-primary btn-lg" @click="startPractice">
                            <i class="bi bi-play-fill me-2"></i>Start this step
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="container mt-5" x-show="loadError">
            <div class="alert alert-warning" x-text="loadError"></div>
            <a href="routines.html" class="btn btn-primary">Back to routines</a>
        </div>

        <div class="container mt-5 text-center" x-show="isLoading">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script defer src="js/app.js"></script>
    <script defer src="js/practice-data.js"></script>
    <script type="module" src="js/supabase-init.js"></script>
    <script defer src="js/routine.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
</body>
</html>
