<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>guitar.io - My Songs</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <div x-data="songsApp" class="dashboard-container">
        <div data-nav-include="back-dashboard"></div>
        <!-- Main Content -->
        <div class="container mt-4">
            <div class="row mb-4">
                <div class="col-12 d-flex justify-content-between align-items-center">
                    <div>
                        <h2 class="mb-3"><i class="bi bi-music-note-list me-2"></i>My Songs</h2>
                        <p class="text-muted">Your personal library of songs to practice</p>
                    </div>
                    <a href="add-song.html" class="btn btn-primary">
                        <i class="bi bi-plus-circle-fill me-1"></i> Add New Song
                    </a>
                </div>
            </div>

            <!-- Search -->
            <div class="row mb-4">
                <div class="col-12 col-lg-6">
                    <label for="songSearch" class="form-label">Search songs</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                        <input
                            id="songSearch"
                            type="text"
                            class="form-control"
                            placeholder="Search by title or artist"
                            x-model="searchQuery"
                        >
                    </div>
                </div>
            </div>

            <!-- Songs Grid -->
            <div class="row g-4">
                <template x-for="song in filteredSongs" :key="song.id">
                    <div class="col-md-6 col-lg-4">
                        <div class="card song-card h-100">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-start mb-2">
                                    <h5 class="card-title mb-0" x-text="song.title"></h5>
                                    <span class="badge bg-info" x-text="song.bpm + ' BPM'"></span>
                                </div>
                                <p class="card-text text-muted small" x-text="song.artist"></p>
                            </div>
                            <div class="card-footer bg-white border-top-0">
                                <a :href="song.song_url" target="_blank" class="btn btn-secondary w-100 mb-2" x-show="song.song_url">
                                    <i class="bi bi-link-45deg me-1"></i>View Tab
                                </a>
                                <a :href="'song.html?id=' + song.id" class="btn btn-primary w-100">
                                    <i class="bi bi-play-fill me-1"></i>Practice
                                </a>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>
    
    
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script defer src="js/app.js"></script>

    <script defer src="js/practice-data.js"></script>

    <script defer src="js/songs.js"></script>

    <script type="module" src="js/supabase-init.js"></script>
    <script type="module" src="js/includes.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>

</body>
</html>
