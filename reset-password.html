<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>guitar.io - Set New Password</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container-fluid vh-100 d-flex align-items-center justify-content-center bg-light">
        <div class="row w-100">
            <div class="col-12 col-md-6 col-lg-4 mx-auto">
                <div class="card shadow-lg">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h1 class="display-4 fw-bold text-primary">guitar.io</h1>
                            <p class="text-muted">Choose a new password</p>
                        </div>

                        <div x-data="resetPasswordForm()" x-init="init()" x-cloak>
                            <div x-show="!sessionChecked" class="text-center py-4">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                            </div>

                            <template x-if="sessionChecked && !linkInvalid">
                                <form @submit.prevent="handleSubmit">
                                    <div class="mb-3">
                                        <label for="password" class="form-label">New password</label>
                                        <input
                                            type="password"
                                            class="form-control form-control-lg"
                                            id="password"
                                            x-model="password"
                                            placeholder="Enter a new password"
                                            required
                                            autocomplete="new-password"
                                        >
                                    </div>

                                    <div class="mb-3">
                                        <label for="confirmPassword" class="form-label">Confirm password</label>
                                        <input
                                            type="password"
                                            class="form-control form-control-lg"
                                            id="confirmPassword"
                                            x-model="confirmPassword"
                                            placeholder="Confirm your password"
                                            required
                                            autocomplete="new-password"
                                        >
                                    </div>

                                    <div x-show="errorMessage"
                                         x-transition
                                         class="alert alert-danger mb-3"
                                         role="alert"
                                         x-text="errorMessage">
                                    </div>

                                    <div x-show="successMessage"
                                         x-transition
                                         class="alert alert-success mb-3"
                                         role="alert"
                                         x-text="successMessage">
                                    </div>

                                    <div class="d-grid mb-3">
                                        <button
                                            type="submit"
                                            class="btn btn-primary btn-lg"
                                            :disabled="isLoading">
                                            <span x-show="!isLoading">Update password</span>
                                            <span x-show="isLoading">
                                                <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                                                Saving...
                                            </span>
                                        </button>
                                    </div>
                                </form>
                            </template>

                            <div x-show="sessionChecked && linkInvalid" class="alert alert-warning" role="alert" x-text="errorMessage"></div>

                            <div class="text-center mt-3">
                                <a href="index.html" class="text-decoration-none">Back to Login</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script defer src="js/app.js"></script>
    <script defer src="js/auth.js"></script>
    <script type="module" src="js/supabase-init.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
</body>
</html>
