<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>guitar.io - Exercises</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <div x-data="exercisesApp" class="dashboard-container">
        <div data-nav-include="back-dashboard"></div>
        <!-- Main Content -->
        <div class="container mt-4">
            <div class="row mb-4">
                <div class="col-12">
                    <h2 class="mb-3"><i class="bi bi-journal-check me-2"></i>Guitar Exercises</h2>
                    <p class="text-muted">Practice these exercises to improve your technique and skills</p>
                </div>
            </div>

            <!-- Filter Tabs -->
            <ul class="nav nav-tabs mb-4">
                <li class="nav-item">
                    <a class="nav-link" :class="{ 'active': filterCategory === 'all' }" href="#" @click.prevent="filterCategory = 'all'">
                        All Exercises
                    </a>
                </li>
                <template x-for="category in categories" :key="category">
                    <li class="nav-item">
                        <a class="nav-link"
                           href="#"
                           :class="{ 'active': filterCategory === category }"
                           @click.prevent="filterCategory = category">
                            <span x-text="category.charAt(0).toUpperCase() + category.slice(1)"></span>
                        </a>
                    </li>
                </template>
            </ul>

            <!-- Search -->
            <div class="row mb-4">
                <div class="col-12 col-lg-6">
                    <label for="exerciseSearch" class="form-label">Search exercises</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                        <input
                            id="exerciseSearch"
                            type="text"
                            class="form-control"
                            placeholder="Search by title, description, or category"
                            x-model="searchQuery"
                        >
                    </div>
                </div>
            </div>

            <!-- Exercises Grid -->
            <div class="row g-4">
                <template x-for="exercise in filteredExercises" :key="exercise.id">
                    <div class="col-md-6 col-lg-4">
                        <div class="card exercise-card h-100">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-start mb-2">
                                    <h5 class="card-title mb-0" x-text="exercise.title"></h5>
                                    <span class="badge" 
                                          :class="{
                                              'bg-success': exercise.difficulty === 'beginner',
                                              'bg-warning': exercise.difficulty === 'intermediate',
                                              'bg-danger': exercise.difficulty === 'advanced'
                                          }"
                                          x-text="exercise.difficulty"></span>
                                </div>
                                <p class="card-text text-muted small" x-text="exercise.description"></p>
                                
                                <!-- Progress Info -->
                                <div class="exercise-stats small text-muted mb-2" x-show="exercise.progress">
                                    <i class="bi bi-check-circle me-1"></i>
                                    <span>Practiced <span x-text="exercise.progress?.times_practiced || 0"></span> times</span>
                                </div>
                            </div>
                            <div class="card-footer bg-white border-top-0">
                                <a :href="'exercise.html?id=' + exercise.id" class="btn btn-primary w-100">
                                    <i class="bi bi-play-fill me-1"></i>Practice
                                </a>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>
    
    
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script defer src="js/app.js"></script>

    <script defer src="js/practice-data.js"></script>

    <script defer src="js/exercises.js"></script>

    <script type="module" src="js/supabase-init.js"></script>
    <script type="module" src="js/includes.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>

</body>
</html>
