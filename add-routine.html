<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>guitar.io - New Routine</title>

    <!-- Bootstrap CSS -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div x-data="addRoutineApp" class="container mt-4 mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <a href="dashboard.html" class="navbar-brand fw-bold text-primary fs-4">guitar.io</a>
                    <a href="routines.html" class="btn btn-outline-secondary">
                        <i class="bi bi-x-lg"></i>
                    </a>
                </div>

                <div class="app-loading-block text-center" x-show="isLoadingData" role="status" aria-live="polite" aria-busy="true">
                    <div class="spinner-border text-primary" aria-hidden="true"></div>
                    <p class="text-muted small mb-0">Loading your songs and exercises…</p>
                </div>

                <div class="card" x-show="!isLoadingData" x-cloak>
                    <div class="card-body">
                        <h3 class="card-title mb-4">New practice routine</h3>

                        <form @submit.prevent="saveRoutine">
                            <div class="mb-3">
                                <label for="routineName" class="form-label">Routine name</label>
                                <input type="text" class="form-control" id="routineName" x-model="routineName" required maxlength="200" placeholder="e.g. Morning warm-up">
                            </div>

                            <div class="mb-4">
                                <label for="routineDesc" class="form-label">Description <span class="text-muted">(optional)</span></label>
                                <textarea class="form-control" id="routineDesc" rows="2" x-model="description" maxlength="2000" placeholder="What is this routine for?"></textarea>
                            </div>

                            <h5 class="mb-3">Add songs and exercises</h5>
                            <p class="text-muted small">Pick from your songs and the exercise catalog. Set minutes for each step. Order is the order you will practice.</p>

                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <label class="form-label">Add a song</label>
                                    <div class="input-group">
                                        <select class="form-select" x-model="songSelectId">
                                            <option value="">Select a song…</option>
                                            <template x-for="s in songs" :key="s.id">
                                                <option :value="s.id" x-text="s.title + (s.artist ? ' — ' + s.artist : '')"></option>
                                            </template>
                                        </select>
                                        <button type="button" class="btn btn-outline-primary" @click="addSongToDraft" :disabled="!songSelectId">
                                            Add
                                        </button>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Add an exercise</label>
                                    <div class="input-group">
                                        <select class="form-select" x-model="exerciseSelectId">
                                            <option value="">Select an exercise…</option>
                                            <template x-for="ex in exercises" :key="ex.id">
                                                <option :value="ex.id" x-text="ex.title"></option>
                                            </template>
                                        </select>
                                        <button type="button" class="btn btn-outline-primary" @click="addExerciseToDraft" :disabled="!exerciseSelectId">
                                            Add
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div class="table-responsive mb-3">
                                <table class="table align-middle">
                                    <thead>
                                        <tr>
                                            <th style="width: 3rem;">#</th>
                                            <th>Type</th>
                                            <th>Item</th>
                                            <th style="width: 8rem;">Minutes</th>
                                            <th style="width: 8rem;"></th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template x-for="(item, index) in draftItems" :key="item.clientId">
                                            <tr>
                                                <td x-text="index + 1"></td>
                                                <td>
                                                    <span class="badge" :class="item.item_type === 'song' ? 'bg-primary' : 'bg-secondary'" x-text="item.item_type === 'song' ? 'Song' : 'Exercise'"></span>
                                                </td>
                                                <td>
                                                    <div class="fw-semibold" x-text="item.title"></div>
                                                    <div class="small text-muted" x-show="item.subtitle" x-text="item.subtitle"></div>
                                                </td>
                                                <td>
                                                    <input type="number" class="form-control form-control-sm" min="1" max="180" x-model.number="item.duration_minutes" @change="clampDuration(item)">
                                                </td>
                                                <td class="text-end">
                                                    <div class="btn-group btn-group-sm">
                                                        <button type="button" class="btn btn-outline-secondary" @click="moveUp(index)" :disabled="index === 0" title="Move up">
                                                            <i class="bi bi-arrow-up"></i>
                                                        </button>
                                                        <button type="button" class="btn btn-outline-secondary" @click="moveDown(index)" :disabled="index === draftItems.length - 1" title="Move down">
                                                            <i class="bi bi-arrow-down"></i>
                                                        </button>
                                                        <button type="button" class="btn btn-outline-danger" @click="removeItem(index)" title="Remove">
                                                            <i class="bi bi-trash"></i>
                                                        </button>
                                                    </div>
                                                </td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>

                            <p class="text-muted small" x-show="draftItems.length === 0">Add at least one song or exercise to save the routine.</p>

                            <div x-show="isSaving" class="text-center my-3">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Saving...</span>
                                </div>
                            </div>

                            <div x-show="errorMessage" class="alert alert-danger" x-text="errorMessage"></div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg" :disabled="isSaving || draftItems.length === 0">
                                    <span x-show="!isSaving">Save routine</span>
                                    <span x-show="isSaving">Saving…</span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script defer src="js/app.js"></script>

    <script defer src="js/practice-data.js"></script>

    <script defer src="js/add-routine.js"></script>

    <script type="module" src="js/supabase-init.js"></script>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>

</body>
</html>
