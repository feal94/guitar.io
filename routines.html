<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>guitar.io - My Routines</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <div x-data="routinesApp()" class="dashboard-container">
        <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
            <div class="container-fluid">
                <a class="navbar-brand fw-bold text-primary" href="dashboard.html">guitar.io</a>

                <div class="d-flex align-items-center">
                    <a href="dashboard.html" class="btn btn-outline-secondary me-2">
                        <i class="bi bi-arrow-left me-1"></i>Back to Dashboard
                    </a>

                    <div class="dropdown">
                        <button class="btn btn-outline-primary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle me-1"></i>
                            <span x-text="userEmail">User</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="#" @click.prevent="alert('Profile - Coming soon')"><i class="bi bi-person me-2"></i>Profile</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" @click.prevent="logout"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>

        <div class="container mt-4">
            <div class="row mb-4">
                <div class="col-12 d-flex justify-content-between align-items-center flex-wrap gap-2">
                    <div>
                        <h2 class="mb-3"><i class="bi bi-calendar-check me-2"></i>My Routines</h2>
                        <p class="text-muted mb-0">Build ordered practice plans with songs and exercises</p>
                    </div>
                    <a href="add-routine.html" class="btn btn-primary">
                        <i class="bi bi-plus-circle-fill me-1"></i>New routine
                    </a>
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-12 col-lg-6">
                    <label for="routineSearch" class="form-label">Search routines</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                        <input
                            id="routineSearch"
                            type="text"
                            class="form-control"
                            placeholder="Search by name or description"
                            x-model="searchQuery"
                        >
                    </div>
                </div>
            </div>

            <div class="row g-4">
                <template x-for="r in filteredRoutines" :key="r.id">
                    <div class="col-md-6 col-lg-4">
                        <div class="card song-card h-100">
                            <div class="card-body">
                                <h5 class="card-title mb-2" x-text="r.name"></h5>
                                <p class="card-text text-muted small mb-2" x-show="r.description" x-text="r.description"></p>
                                <p class="text-muted small mb-0">
                                    <i class="bi bi-clock me-1"></i>
                                    <span x-text="r.duration_minutes != null ? r.duration_minutes + ' min total' : '—'"></span>
                                </p>
                            </div>
                            <div class="card-footer bg-white border-top-0 d-grid gap-2">
                                <a :href="'routine.html?id=' + r.id" class="btn btn-primary">
                                    <i class="bi bi-play-fill me-1"></i>Open routine
                                </a>
                                <button type="button" class="btn btn-outline-danger btn-sm" @click="confirmDelete(r)">
                                    <i class="bi bi-trash me-1"></i>Delete
                                </button>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <div class="text-center py-5 text-muted" x-show="!isLoading && filteredRoutines.length === 0">
                <p class="mb-3">No routines match your search, or you have not created one yet.</p>
                <a href="add-routine.html" class="btn btn-primary">Create your first routine</a>
            </div>

            <div class="text-center py-5" x-show="isLoading">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script defer src="js/app.js"></script>
    <script defer src="js/practice-data.js"></script>
    <script type="module" src="js/supabase-init.js"></script>
    <script defer src="js/routines.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
</body>
</html>
